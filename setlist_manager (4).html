<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>世界民謡研究会 セトリジェネレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --bdr:#333;--bdr2:#444;
  --ak:#e8c84a;--ak2:#c8a830;
  --tx:#f0ece0;--tx2:#a09888;--tx3:#6a6258;
  --day1:#5090e0;--day2:#e07030;
  --info:#5090e0;--ok:#1D9E75;--ng:#e05050;
}
html,body{background:var(--bg);color:var(--tx);font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
nav{display:flex;border-bottom:1px solid var(--ak);background:var(--bg2);position:sticky;top:0;z-index:10}
.nav-brand{padding:12px 14px;font-size:12px;color:var(--ak);font-weight:700;letter-spacing:.06em;margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--tx3);border-bottom:2px solid transparent;letter-spacing:.04em;transition:all .15s;white-space:nowrap;min-width:80px;text-align:center}
.nav-tab.active{color:var(--ak);border-bottom-color:var(--ak)}
.page{display:none;padding:14px;max-width:800px;margin:0 auto}
.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px;margin-bottom:12px}
h2{font-size:15px;font-weight:700;color:var(--ak);margin-bottom:12px;letter-spacing:.04em}
label{font-size:12px;color:var(--tx2);letter-spacing:.04em;display:block;margin-bottom:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
input[type=text],input[type=number],input[type=password]{
  background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);
  padding:10px 12px;border-radius:6px;font-size:16px;width:100%;
  font-family:inherit;transition:border-color .15s;
  -webkit-appearance:none;appearance:none
}
input:focus{outline:none;border-color:var(--ak)}
.btn{
  padding:11px 18px;border-radius:6px;font-size:14px;font-family:inherit;
  cursor:pointer;border:1px solid var(--bdr2);background:transparent;
  color:var(--tx2);font-weight:600;transition:all .15s;
  -webkit-appearance:none;touch-action:manipulation;min-height:44px
}
.btn:active{opacity:.75;transform:scale(.97)}
.btn-ak{background:var(--ak);color:#1a1400;border-color:var(--ak)}
.btn-danger{color:var(--ng);border-color:#553}
.btn-danger:active{border-color:var(--ng)}
.btn-sm{padding:8px 12px;font-size:13px;min-height:36px}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mt10{margin-top:10px}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:6px;font-size:12px;color:var(--tx3);margin-bottom:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--tx3);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--ok)}.sync-dot.err{background:var(--ng)}.sync-dot.connecting{background:var(--ak)}
.sl-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.sl-select-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s;touch-action:manipulation}
.sl-select-card:active{opacity:.75}
.sl-select-name{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:5px}
.sl-select-count{font-size:12px;color:var(--tx3)}
/* intensity slider */
.intensity-wrap{margin:12px 0}
.intensity-track{position:relative;height:44px;display:flex;align-items:center;cursor:pointer;user-select:none;touch-action:none}
.intensity-rail{position:absolute;left:0;right:0;height:5px;background:var(--bg3);border-radius:3px;border:1px solid var(--bdr)}
.intensity-fill{position:absolute;left:0;height:5px;border-radius:3px;pointer-events:none}
.intensity-ticks{position:absolute;left:0;right:0;display:flex;justify-content:space-between;pointer-events:none}
.intensity-tick{width:2px;height:12px;background:var(--bdr2);border-radius:1px;margin-top:-4px}
.intensity-thumb{position:absolute;width:28px;height:28px;border-radius:50%;border:2px solid var(--ak);background:var(--bg2);transform:translateX(-50%);cursor:grab;z-index:2;touch-action:none}
.intensity-labels{display:flex;justify-content:space-between;margin-top:6px}
.intensity-lbl{font-size:10px;color:var(--tx3);text-align:center;width:20%;cursor:pointer;user-select:none;padding:4px 0}
.intensity-lbl.active-lbl{font-weight:700}
.intensity-valtext{font-size:13px;font-weight:600;margin-top:4px}
/* band rows */
.band-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.band-row:last-child{border-bottom:none}
.bnum{font-size:18px;font-weight:700;color:var(--tx3);min-width:24px;line-height:1.3}
.binfo{flex:1;min-width:0}
.bname{font-size:14px;font-weight:600;color:var(--tx)}
.bsong{font-size:12px;color:var(--tx2);margin:2px 0 4px}
.bmem{font-size:11px;color:var(--tx3);word-break:break-all}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;margin-left:6px;vertical-align:middle;border:1px solid}
.bc{background:rgba(29,158,117,.12);color:#5DCAA5;border-color:rgba(29,158,117,.3)}
.bm{background:rgba(186,117,23,.12);color:#EF9F27;border-color:rgba(186,117,23,.3)}
.bh{background:rgba(226,75,74,.12);color:#F09595;border-color:rgba(226,75,74,.3)}
/* admin login */
.pw-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;padding:20px}
.pw-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:28px 24px;width:100%;max-width:320px;text-align:center}
.pw-box h2{margin-bottom:16px}
.pw-err{color:var(--ng);font-size:13px;margin-top:8px}
/* chips */
.chip-group{display:inline-flex;align-items:stretch;border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.chip-group-active{border-color:var(--ak)}
.chip-name{padding:8px 13px;font-size:13px;cursor:pointer;border:none;border-right:1px solid var(--bdr);background:transparent;color:var(--tx2);font-weight:600;touch-action:manipulation;min-height:36px}
.chip-name:active{opacity:.75}
.active-chip-name{background:var(--ak);color:#1a1400;border-right-color:var(--ak2)}
.chip-icon{padding:8px 10px;font-size:15px;cursor:pointer;border:none;background:transparent;color:var(--tx3);line-height:1;touch-action:manipulation;min-height:36px;min-width:36px}
.chip-icon:active{opacity:.75}
/* result */
.stat-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:var(--bg3);border-radius:6px;padding:10px;text-align:center;flex:1;min-width:55px}
.stat-val{font-size:20px;font-weight:700;color:var(--ak)}
.stat-lbl{font-size:10px;color:var(--tx3)}
.days-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.day-hdr{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:4px;margin-bottom:8px;display:inline-block}
.dh1{background:rgba(80,144,224,.12);color:var(--day1);border:1px solid rgba(80,144,224,.25)}
.dh2{background:rgba(224,112,48,.12);color:var(--day2);border:1px solid rgba(224,112,48,.25)}
.slot-card{background:var(--bg3);border-radius:6px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px}
.snum{font-size:20px;font-weight:700;color:var(--tx3);min-width:24px;line-height:1.1;margin-top:2px}
.sbody{flex:1;min-width:0}
.stime{font-size:11px;color:var(--tx3);margin-bottom:1px}
.sname{font-size:13px;font-weight:600;color:var(--tx)}
.ssong{font-size:12px;color:var(--tx2);margin:2px 0 3px}
.smem{font-size:11px;color:var(--tx3);word-break:break-all}
.group-wrap{border:1px solid rgba(80,144,224,.3);border-radius:6px;padding:4px;margin-bottom:6px;background:rgba(80,144,224,.04)}
.group-label{font-size:10px;color:var(--info);padding:2px 8px 4px;letter-spacing:.06em;text-transform:uppercase}
.group-wrap .slot-card{margin-bottom:3px;background:var(--bg2)}
.group-wrap .slot-card:last-child{margin-bottom:0}
.empty{color:var(--tx3);font-size:13px;text-align:center;padding:28px;border:1px dashed var(--bdr);border-radius:8px}
.msg-ok{color:#5DCAA5;font-size:13px}
.msg-err{color:var(--ng);font-size:13px}
/* mobile overrides */
@media(max-width:500px){
  .form-grid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .days-grid{grid-template-columns:1fr}
  .sl-select-grid{grid-template-columns:1fr}
  .nav-brand{font-size:11px;padding:12px 10px}
  .nav-tab{padding:12px 12px;font-size:12px}
  .flex{gap:6px}
}
</style>
</head>
<body>

<nav>
  <span class="nav-brand">世界民謡研究会</span>
  <button class="nav-tab active" id="tab-user" onclick="showPage('user')">エントリー</button>
  <button class="nav-tab" id="tab-admin" onclick="showPage('admin-gate')">管理者</button>
</nav>

<!-- ユーザーページ -->
<div id="page-user" class="page active">
  <div class="sync-bar"><div class="sync-dot connecting" id="sync-dot-u"></div><span id="sync-txt-u">接続中...</span></div>
  <div class="card" id="u-step-select">
    <h2>エントリーするセトリを選んでください</h2>
    <div id="u-sl-list"><div class="empty">読み込み中...</div></div>
  </div>
  <div id="u-step-form" style="display:none">
    <div class="card">
      <div class="flex" style="margin-bottom:12px;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;color:var(--tx3);margin-bottom:3px">エントリー先のセトリ</div>
          <div style="font-size:15px;font-weight:700;color:var(--ak);word-break:break-all" id="u-sl-selected-name"></div>
        </div>
        <button class="btn btn-sm" onclick="unselectUserSl()" style="flex-shrink:0">&#x2190; 戻る</button>
      </div>
      <h2 style="border-top:1px solid var(--bdr);padding-top:12px;margin-top:4px">バンド情報を入力</h2>
      <div class="form-grid">
        <div class="fg full"><label>バンド名 *</label><input type="text" id="u-band" placeholder="例：The Rockers" autocomplete="off"></div>
        <div class="fg full"><label>演奏曲名 *</label><input type="text" id="u-song" placeholder="例：Highway to Hell" autocomplete="off"></div>
        <div class="fg"><label>Vo（ボーカル）</label><input type="text" id="u-vo" placeholder="名前" autocomplete="off"></div>
        <div class="fg"><label>Gt1（ギター1）</label><input type="text" id="u-gt1" placeholder="名前" autocomplete="off"></div>
        <div class="fg"><label>Gt2（ギター2）</label><input type="text" id="u-gt2" placeholder="省略可" autocomplete="off"></div>
        <div class="fg"><label>Ba（ベース）</label><input type="text" id="u-ba" placeholder="名前" autocomplete="off"></div>
        <div class="fg"><label>Key（キーボード）</label><input type="text" id="u-key" placeholder="省略可" autocomplete="off"></div>
        <div class="fg"><label>Dr（ドラム）</label><input type="text" id="u-dr" placeholder="名前" autocomplete="off"></div>
        <div class="fg"><label>BPM（任意）</label><input type="number" id="u-bpm" placeholder="120" min="40" max="300" inputmode="numeric"></div>
      </div>
      <div class="intensity-wrap">
        <label>曲の雰囲気</label>
        <div class="intensity-track" id="itrack">
          <div class="intensity-rail"></div>
          <div class="intensity-fill" id="ifill"></div>
          <div class="intensity-ticks" id="iticks"></div>
          <div class="intensity-thumb" id="ithumb"></div>
        </div>
        <div class="intensity-labels" id="ilabels"></div>
        <div class="intensity-valtext" id="ivaltext"></div>
      </div>
      <div class="flex mt10">
        <button class="btn btn-ak" id="submit-btn" onclick="submitBand()">エントリーする</button>
        <span id="u-msg"></span>
      </div>
    </div>
    <div class="card">
      <div class="flex" style="margin-bottom:10px">
        <h2 style="margin:0;flex:1" id="u-list-title">エントリー済みバンド</h2>
        <button class="btn btn-sm" onclick="manualRefresh()">&#x21BB; 更新</button>
      </div>
      <div id="user-band-list"><div class="empty">まだエントリーがありません</div></div>
    </div>
  </div>
</div>

<!-- 管理者ログイン -->
<div id="page-admin-gate" class="page">
  <div class="pw-screen">
    <div class="pw-box">
      <h2>管理者ログイン</h2>
      <input type="password" id="pw-input" placeholder="パスワード" style="margin-bottom:12px;text-align:center;letter-spacing:.1em" onkeydown="if(event.key==='Enter')checkPw()" autocomplete="current-password">
      <button class="btn btn-ak" style="width:100%" onclick="checkPw()">ログイン</button>
      <div class="pw-err" id="pw-err"></div>
      <div style="font-size:12px;color:var(--tx3);margin-top:16px">初期パスワード: admin</div>
    </div>
  </div>
</div>

<!-- 管理者ページ -->
<div id="page-admin" class="page">
  <div class="sync-bar"><div class="sync-dot ok" id="sync-dot-a"></div><span id="sync-txt-a">Firebase 接続済み（自動更新中）</span></div>
  <div class="card">
    <div class="flex" style="margin-bottom:12px">
      <h2 style="margin:0;flex:1">セトリ管理</h2>
      <button class="btn btn-sm btn-danger" onclick="adminLogout()">ログアウト</button>
    </div>
    <div class="flex">
      <input type="text" id="new-sl-name" placeholder="新しいセトリ名（例：春ライブ2025）" style="flex:1" onkeydown="if(event.key==='Enter')createSetlist()" autocomplete="off">
      <button class="btn btn-ak btn-sm" onclick="createSetlist()">作成</button>
    </div>
    <div class="flex mt10" id="sl-chips" style="flex-wrap:wrap;gap:6px"></div>
  </div>
  <div class="card">
    <h2>パスワード変更</h2>
    <div class="flex">
      <input type="password" id="pw-new1" placeholder="新しいパスワード" style="flex:1" autocomplete="new-password">
      <input type="password" id="pw-new2" placeholder="確認" style="flex:1" autocomplete="new-password">
      <button class="btn btn-sm" onclick="changePw()">変更</button>
    </div>
    <div id="pw-change-msg" style="font-size:13px;margin-top:8px"></div>
  </div>
  <div id="admin-content"></div>
</div>

<script>
/* ═══════════════════════════════════
   Firebase REST API（fetch のみ・SDK不要）
═══════════════════════════════════ */
const FB = 'https://setlist-generator-19e2d-default-rtdb.asia-southeast1.firebasedatabase.app';

async function fbGet(path){
  const r=await fetch(FB+'/'+path+'.json');
  if(!r.ok)throw new Error('GET '+path+' '+r.status);
  return r.json();
}
async function fbPush(path,data){
  const r=await fetch(FB+'/'+path+'.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error('POST '+path+' '+r.status);
  return r.json();
}
async function fbSet(path,data){
  const r=await fetch(FB+'/'+path+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error('PUT '+path+' '+r.status);
  return r.json();
}
async function fbPatch(path,data){
  const r=await fetch(FB+'/'+path+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error('PATCH '+path+' '+r.status);
  return r.json();
}
async function fbDelete(path){
  const r=await fetch(FB+'/'+path+'.json',{method:'DELETE'});
  if(!r.ok)throw new Error('DELETE '+path+' '+r.status);
}

/* ═══════════════════════════════════
   ポーリングで全デバイス対応
   （SSEはスマホで不安定なので使わない）
═══════════════════════════════════ */
let pollTimer=null;
const POLL_MS=8000;

function startPolling(){
  stopPolling();
  pollTimer=setInterval(pollOnce,POLL_MS);
}
function stopPolling(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
}

async function pollOnce(){
  try{
    const data=await fbGet('setlists');
    slMap=data||{};
    setSyncStatus('u',true,'Firebase 同期中（'+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'）');
    applyUpdate();
  }catch(e){
    setSyncStatus('u',false,'同期エラー（再試行中）');
  }
}
function applyUpdate(){
  if(document.getElementById('page-user').classList.contains('active')){
    if(userSlId){const sl=findSl(userSlId);if(sl)renderUserBandList(sl);else{unselectUserSl();renderUserSlList();}}
    else renderUserSlList();
  }
  if(adminLoggedIn&&document.getElementById('page-admin').classList.contains('active')){
    renderChips();if(currentSlId)renderAdminContent();
  }
}

/* ページ表示中だけポーリング（バッテリー・通信節約） */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)stopPolling();else{pollOnce();startPolling();}
});

/* ═══════════════════════════════════
   アプリ状態
═══════════════════════════════════ */
const LEVELS=[
  {v:1,label:'穏やか',    color:'#1D9E75'},
  {v:2,label:'やや穏やか',color:'#639922'},
  {v:3,label:'ふつう',    color:'#BA7517'},
  {v:4,label:'やや激しい',color:'#D85A30'},
  {v:5,label:'激しい',    color:'#E24B4A'}
];
let intensity=3,adminLoggedIn=false,currentSlId=null,userSlId=null;
let pw='admin',slMap={};

function slList(){
  return Object.entries(slMap).map(([fbKey,v])=>({...v,fbKey})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
}
function findSl(id){return slList().find(s=>s.id===id);}

/* ═══════════════════════════════════
   ユーティリティ
═══════════════════════════════════ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ibadge(v){
  if(v<=2)return'<span class="badge bc">'+(LEVELS[v-1]?LEVELS[v-1].label:'穏やか')+'</span>';
  if(v===3)return'<span class="badge bm">ふつう</span>';
  return'<span class="badge bh">'+(LEVELS[v-1]?LEVELS[v-1].label:'激しい')+'</span>';
}
function mstr(b){return['vo','gt1','gt2','ba','key','dr'].filter(p=>b[p]).map(p=>p.toUpperCase()+': '+esc(b[p])).join(' / ');}
function addMin(t,m){const[h,mn]=t.split(':').map(Number),tot=h*60+mn+m;return Math.floor(tot/60)+':'+String(tot%60).padStart(2,'0');}
function norm(s){return(s||'').replace(/\s/g,'').toLowerCase();}
function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function setSyncStatus(side,ok,txt){
  const dot=document.getElementById('sync-dot-'+side);
  const span=document.getElementById('sync-txt-'+side);
  if(!dot||!span)return;
  dot.className='sync-dot '+(ok?'ok':'err');
  span.textContent=txt;
}
function clearInputs(ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}

/* ═══════════════════════════════════
   スライダー（タッチ対応）
═══════════════════════════════════ */
function buildSlider(){
  document.getElementById('iticks').innerHTML=LEVELS.map(()=>'<div class="intensity-tick"></div>').join('');
  document.getElementById('ilabels').innerHTML=LEVELS.map(l=>'<div class="intensity-lbl" onclick="setIntensity('+l.v+')">'+l.label+'</div>').join('');
  const track=document.getElementById('itrack');
  function pctToV(px){
    const r=track.getBoundingClientRect();
    return Math.max(1,Math.min(5,Math.round(Math.max(0,Math.min(1,(px-r.left)/r.width))*4)+1));
  }
  track.addEventListener('click',e=>setIntensity(pctToV(e.clientX)));
  let drag=false;
  const thumb=document.getElementById('ithumb');
  thumb.addEventListener('mousedown',e=>{drag=true;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(drag)setIntensity(pctToV(e.clientX));});
  document.addEventListener('mouseup',()=>drag=false);
  /* タッチ：thumb だけでなく track 全体でも動く */
  track.addEventListener('touchstart',e=>{drag=true;setIntensity(pctToV(e.touches[0].clientX));e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',e=>{if(drag)setIntensity(pctToV(e.touches[0].clientX));},{passive:true});
  document.addEventListener('touchend',()=>drag=false);
  setIntensity(3);
}
function setIntensity(v){
  intensity=v;
  const pct=(v-1)/4,col=LEVELS[v-1].color;
  const fill=document.getElementById('ifill');
  const thumb=document.getElementById('ithumb');
  if(fill){fill.style.width=pct*100+'%';fill.style.background=col;}
  if(thumb){thumb.style.left=pct*100+'%';thumb.style.borderColor=col;}
  const vt=document.getElementById('ivaltext');
  if(vt){vt.style.color=col;vt.textContent=LEVELS[v-1].label;}
  document.querySelectorAll('.intensity-lbl').forEach((el,i)=>{
    el.classList.toggle('active-lbl',i===v-1);
    el.style.color=i===v-1?col:'';
  });
}

/* ═══════════════════════════════════
   ナビ
═══════════════════════════════════ */
function showPage(name){
  ['user','admin-gate','admin'].forEach(p=>document.getElementById('page-'+p).classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(name==='admin-gate'){
    document.getElementById('page-'+(adminLoggedIn?'admin':'admin-gate')).classList.add('active');
  }else{
    document.getElementById('page-'+name).classList.add('active');
  }
  document.getElementById(name==='user'?'tab-user':'tab-admin').classList.add('active');
  if(name==='user')renderUserSlList();
}

/* ═══════════════════════════════════
   認証
═══════════════════════════════════ */
function checkPw(){
  if(document.getElementById('pw-input').value===pw){
    adminLoggedIn=true;
    document.getElementById('pw-err').textContent='';
    document.getElementById('page-admin-gate').classList.remove('active');
    document.getElementById('page-admin').classList.add('active');
    renderChips();renderAdminContent();
  }else{
    document.getElementById('pw-err').textContent='パスワードが違います';
  }
}
function adminLogout(){
  adminLoggedIn=false;
  document.getElementById('pw-input').value='';
  showPage('admin-gate');
}
async function changePw(){
  const n1=document.getElementById('pw-new1').value;
  const n2=document.getElementById('pw-new2').value;
  const msg=document.getElementById('pw-change-msg');
  if(!n1){msg.className='msg-err';msg.textContent='パスワードを入力してください';return;}
  if(n1!==n2){msg.className='msg-err';msg.textContent='パスワードが一致しません';return;}
  try{
    await fbSet('config/pw',n1);pw=n1;
    clearInputs(['pw-new1','pw-new2']);
    msg.className='msg-ok';msg.textContent='パスワードを変更しました';
    setTimeout(()=>msg.textContent='',3000);
  }catch(e){msg.className='msg-err';msg.textContent='保存に失敗しました';}
}

/* ═══════════════════════════════════
   ユーザー：セトリ選択
═══════════════════════════════════ */
function renderUserSlList(){
  const el=document.getElementById('u-sl-list');
  const list=slList();
  if(!list.length){el.innerHTML='<div class="empty">管理者がまだセトリを作成していません</div>';return;}
  el.innerHTML='<div class="sl-select-grid">'+list.map(s=>{
    const cnt=Object.keys(s.bands||{}).length;
    const div=document.createElement('div');
    div.className='sl-select-card';
    div.innerHTML='<div class="sl-select-name">'+esc(s.name)+'</div><div class="sl-select-count">エントリー済み '+cnt+' バンド</div>';
    div.addEventListener('click',function(){selectUserSl(s.id);});
    return div.outerHTML;
  }).join('')+'</div>';
  /* re-attach event listeners after innerHTML set */
  el.querySelectorAll('.sl-select-card').forEach(function(card,i){
    card.addEventListener('click',function(){selectUserSl(list[i].id);});
  });
}
function selectUserSl(id){
  userSlId=id;
  const sl=findSl(id);if(!sl)return;
  document.getElementById('u-step-select').style.display='none';
  document.getElementById('u-step-form').style.display='block';
  document.getElementById('u-sl-selected-name').textContent=sl.name;
  document.getElementById('u-list-title').textContent='「'+sl.name+'」のエントリー済みバンド';
  renderUserBandList(sl);
}
function unselectUserSl(){
  userSlId=null;
  document.getElementById('u-step-select').style.display='block';
  document.getElementById('u-step-form').style.display='none';
  renderUserSlList();
}
function renderUserBandList(sl){
  const el=document.getElementById('user-band-list');
  const bands=Object.values(sl.bands||{}).sort((a,b)=>(a.addedAt||0)-(b.addedAt||0));
  if(!bands.length){el.innerHTML='<div class="empty">まだエントリーがありません</div>';return;}
  el.innerHTML=bands.map((b,i)=>'<div class="band-row">'
    +'<div class="bnum">'+(i+1)+'</div>'
    +'<div class="binfo">'
    +'<div class="bname">'+esc(b.name)+ibadge(b.intensity)+'</div>'
    +'<div class="bsong">&#9834; '+esc(b.song)+(b.bpm?' <span style="color:var(--tx3)">BPM '+esc(b.bpm)+'</span>':'')+'</div>'
    +'<div class="bmem">'+mstr(b)+'</div>'
    +'</div></div>').join('');
}
async function manualRefresh(){
  setSyncStatus('u',false,'更新中...');
  await pollOnce();
  if(userSlId){const sl=findSl(userSlId);if(sl)renderUserBandList(sl);}
}

/* ═══════════════════════════════════
   ユーザー：エントリー送信
═══════════════════════════════════ */
async function submitBand(){
  if(!userSlId){alert('セトリを選んでください');return;}
  const sl=findSl(userSlId);if(!sl)return;
  const name=document.getElementById('u-band').value.trim();
  const song=document.getElementById('u-song').value.trim();
  const msgEl=document.getElementById('u-msg');
  if(!name||!song){msgEl.className='msg-err';msgEl.textContent='バンド名と曲名は必須です';return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='送信中...';
  const band={
    id:uid(),name,song,
    bpm:document.getElementById('u-bpm').value.trim(),
    vo:document.getElementById('u-vo').value.trim(),
    gt1:document.getElementById('u-gt1').value.trim(),
    gt2:document.getElementById('u-gt2').value.trim(),
    ba:document.getElementById('u-ba').value.trim(),
    key:document.getElementById('u-key').value.trim(),
    dr:document.getElementById('u-dr').value.trim(),
    intensity,addedAt:Date.now()
  };
  try{
    await fbPatch('setlists/'+sl.fbKey+'/bands/'+band.id,band);
    clearInputs(['u-band','u-song','u-bpm','u-vo','u-gt1','u-gt2','u-ba','u-key','u-dr']);
    setIntensity(3);
    msgEl.className='msg-ok';msgEl.textContent='エントリーしました！';
    setTimeout(()=>msgEl.textContent='',4000);
    /* 送信後すぐポーリングして一覧を更新 */
    await pollOnce();
  }catch(e){
    msgEl.className='msg-err';msgEl.textContent='送信に失敗しました。通信状況を確認して再度お試しください。';
  }
  btn.disabled=false;btn.textContent='エントリーする';
}

/* ═══════════════════════════════════
   管理者：セトリ CRUD
═══════════════════════════════════ */
function renderChips(){
  const el=document.getElementById('sl-chips');if(!el)return;
  const list=slList();
  if(!list.length){el.innerHTML='<span style="font-size:12px;color:var(--tx3)">セトリがまだありません</span>';return;}
  el.innerHTML=list.map(s=>'<div class="chip-group'+(s.id===currentSlId?' chip-group-active':'')+'"><button class="chip-name'+(s.id===currentSlId?' active-chip-name':'')+'" onclick="selectSl(\''+s.id+'\')">'+esc(s.name)+'</button><button class="chip-icon" title="コピー" onclick="copySl(\''+s.id+'\')">&#x2398;</button><button class="chip-icon" style="color:var(--ng)" title="削除" onclick="deleteSl(\''+s.id+'\')">&#x00D7;</button></div>').join('');
}
async function createSetlist(){
  const name=document.getElementById('new-sl-name').value.trim();
  if(!name){alert('セトリ名を入力してください');return;}
  const id='sl_'+uid();
  try{
    await fbPush('setlists',{id,name,bands:{},day1:[],day2:[],createdAt:Date.now()});
    document.getElementById('new-sl-name').value='';
    currentSlId=id;
    await pollOnce();
    renderChips();renderAdminContent();
  }catch(e){alert('作成に失敗しました: '+e.message);}
}
function selectSl(id){currentSlId=id;renderChips();renderAdminContent();}
async function deleteSl(id){
  if(!confirm('このセトリを削除しますか？'))return;
  const sl=findSl(id);if(!sl)return;
  try{
    await fbDelete('setlists/'+sl.fbKey);
    if(currentSlId===id)currentSlId=null;
    await pollOnce();renderChips();renderAdminContent();
  }catch(e){alert('削除に失敗しました');}
}
async function copySl(id){
  const src=findSl(id);if(!src)return;
  const newId='sl_'+uid();
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=newId;copy.name=src.name+' .copy';copy.createdAt=Date.now();
  delete copy.fbKey;
  try{
    await fbPush('setlists',copy);
    currentSlId=newId;
    await pollOnce();renderChips();renderAdminContent();
  }catch(e){alert('コピーに失敗しました');}
}
async function deleteBand(slId,bandId){
  if(!confirm('このバンドを削除しますか？'))return;
  const sl=findSl(slId);if(!sl)return;
  try{
    await fbDelete('setlists/'+sl.fbKey+'/bands/'+bandId);
    await pollOnce();renderAdminContent();
  }catch(e){alert('削除に失敗しました');}
}

   管理者：コンテンツ描画
═══════════════════════════════════ */
function renderAdminContent(){
  const el=document.getElementById('admin-content');if(!el)return;
  if(!currentSlId){el.innerHTML='';return;}
  const sl=findSl(currentSlId);if(!sl){el.innerHTML='';return;}
  const bands=Object.values(sl.bands||{}).sort((a,b)=>(a.addedAt||0)-(b.addedAt||0));
  const bHtml=bands.length?bands.map((b,i)=>'<div class="band-row"><div class="bnum">'+(i+1)+'</div><div class="binfo"><div class="bname">'+esc(b.name)+ibadge(b.intensity)+'</div><div class="bsong">&#9834; '+esc(b.song)+(b.bpm?' <span style="color:var(--tx3)">BPM '+esc(b.bpm)+'</span>':'')+'</div><div class="bmem">'+mstr(b)+'</div></div><button class="btn btn-sm btn-danger" onclick="deleteBand(\''+sl.id+'\',\''+b.id+'\')">削除</button></div>').join(''):'<div class="empty">エントリーなし</div>';
  el.innerHTML='<div class="card"><div class="flex" style="margin-bottom:12px"><h2 style="margin:0;flex:1">「'+esc(sl.name)+'」('+bands.length+'組)</h2><button class="btn btn-ak btn-sm" onclick="generate()">セトリ生成</button></div>'+bHtml+'</div><div class="card"><h2>生成されたセトリ</h2>'+(sl.day1&&sl.day1.length?renderResult(sl):'<div class="empty">まだ生成されていません</div>')+'</div>';
}

/* ═══════════════════════════════════
   セトリ生成ロジック
═══════════════════════════════════ */
function findConflicts(bs){
  const groups=[];const vis=new Set();
  for(let i=0;i<bs.length;i++){
    if(vis.has(i))continue;
    const g=[i];vis.add(i);
    for(let j=i+1;j<bs.length;j++){
      if(vis.has(j))continue;
      const a=bs[i],b=bs[j];let hit=false;
      for(const p of['gt1','gt2','ba']){const av=norm(a[p]),bv=norm(b[p]);if(av&&bv&&av===bv){hit=true;break;}}
      if(!hit&&norm(a.gt1)&&norm(b.gt2)&&norm(a.gt1)===norm(b.gt2))hit=true;
      if(!hit&&norm(a.gt2)&&norm(b.gt1)&&norm(a.gt2)===norm(b.gt1))hit=true;
      if(hit){g.push(j);vis.add(j);}
    }
    groups.push(g);
  }
  return groups;
}
async function generate(){
  const sl=findSl(currentSlId);if(!sl)return;
  const bands=Object.values(sl.bands||{}).sort((a,b)=>(a.addedAt||0)-(b.addedAt||0));
  if(bands.length<2){alert('バンドを2組以上エントリーしてください');return;}
  const used=new Set();const d1=[],d2=[];
  const half=Math.ceil(bands.length/2);
  const assign=idxs=>{const t=(d1.length<=d2.length&&d1.length<half)?d1:d2;idxs.forEach(i=>{t.push(i);used.add(i);});};
  findConflicts(bands).filter(g=>g.length>1).forEach(g=>{if(!g.some(i=>used.has(i)))assign(g);});
  const sorted=[...bands].map((b,i)=>({b,i})).sort((a,b)=>a.b.intensity-b.b.intensity);
  sorted.filter(({i})=>bands[i].intensity<4&&!used.has(i)).forEach(({i})=>assign([i]));
  sorted.filter(({i})=>bands[i].intensity>=4&&!used.has(i)).forEach(({i})=>assign([i]));
  const makeSlots=idxs=>{
    const bs=idxs.map(i=>bands[i]);
    const s2=[...bs.filter(b=>b.intensity<4),...bs.filter(b=>b.intensity>=4)];
    const cg=findConflicts(bs);const cm={};
    cg.forEach((g,gi)=>{if(g.length>1)g.forEach(i=>cm[bs[i].id]=gi);});
    const out=[];const sg=new Set();
    s2.forEach(b=>{
      const gi=cm[b.id];
      if(gi!==undefined&&!sg.has(gi)){sg.add(gi);cg[gi].forEach(idx=>{if(!out.find(x=>x.id===bs[idx].id))out.push(Object.assign({},bs[idx],{gid:gi}));});}
      else if(gi===undefined&&!out.find(x=>x.id===b.id))out.push(Object.assign({},b,{gid:undefined}));
    });
    return out.map((b,i)=>Object.assign({},b,{slotNum:i+1,ts:addMin('13:00',i*20),te:addMin('13:00',(i+1)*20)}));
  };
  try{
    await fbPatch('setlists/'+sl.fbKey,{day1:makeSlots(d1),day2:makeSlots(d2)});
    await pollOnce();renderAdminContent();
  }catch(e){alert('保存に失敗しました');}
}

/* ═══════════════════════════════════
   結果描画
═══════════════════════════════════ */
function renderResult(sl){
  const n1=(sl.day1||[]).length,n2=(sl.day2||[]).length;
  const stats='<div class="stat-row"><div class="stat"><div class="stat-val">'+(n1+n2)+'</div><div class="stat-lbl">総バンド</div></div><div class="stat"><div class="stat-val">'+n1+'</div><div class="stat-lbl">1日目</div></div><div class="stat"><div class="stat-val">'+n2+'</div><div class="stat-lbl">2日目</div></div><div class="stat"><div class="stat-val">'+(n1*20)+'分</div><div class="stat-lbl">1日目所要</div></div><div class="stat"><div class="stat-val">'+(n2*20)+'分</div><div class="stat-lbl">2日目所要</div></div></div>';
  const rs=slots=>{
    if(!slots||!slots.length)return'<div class="empty">バンドなし</div>';
    const grps={};slots.forEach(s=>{if(s.gid!==undefined){if(!grps[s.gid])grps[s.gid]=[];grps[s.gid].push(s);}});
    let html='';const dg=new Set();
    slots.forEach(s=>{
      if(s.gid!==undefined){if(!dg.has(s.gid)){dg.add(s.gid);html+='<div class="group-wrap"><div class="group-label">&#x21D5; 連続出演（共有メンバー）</div>'+grps[s.gid].map(x=>shHtml(x)).join('')+'</div>';}}
      else html+=shHtml(s);
    });
    return html;
  };
  return stats+'<div class="days-grid"><div><div class="day-hdr dh1">DAY 1 &#8212; '+n1+'バンド</div>'+rs(sl.day1)+'</div><div><div class="day-hdr dh2">DAY 2 &#8212; '+n2+'バンド</div>'+rs(sl.day2)+'</div></div>';
}
function shHtml(s){
  return'<div class="slot-card"><div class="snum">'+s.slotNum+'</div><div class="sbody"><div class="stime">'+s.ts+' &#8212; '+s.te+'</div><div class="sname">'+esc(s.name)+ibadge(s.intensity)+'</div><div class="ssong">&#9834; '+esc(s.song)+(s.bpm?' BPM '+esc(s.bpm):'')+'</div><div class="smem">'+mstr(s)+'</div></div></div>';
}

/* ═══════════════════════════════════
   起動
═══════════════════════════════════ */
async function init(){
  buildSlider();
  setSyncStatus('u',false,'接続中...');
  try{
    const[slData,cfgData]=await Promise.all([fbGet('setlists'),fbGet('config')]);
    slMap=slData||{};
    if(cfgData&&cfgData.pw)pw=cfgData.pw;
    setSyncStatus('u',true,'Firebase 接続済み（自動更新中）');
    renderUserSlList();
    startPolling();
  }catch(e){
    setSyncStatus('u',false,'Firebase 接続エラー。通信環境を確認してリロードしてください。');
    document.getElementById('u-sl-list').innerHTML='<div class="empty">Firebase に接続できません。<br>通信環境を確認してページをリロードしてください。</div>';
  }
}
init();
